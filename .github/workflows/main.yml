name: Music Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: music_sync
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env configuration
        run: |
          cat <<EOF > .env
          YANDEX_TOKEN="${{ secrets.YANDEX_TOKEN }}"
          SPOTIFY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}"
          SPOTIFY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          SPOTIFY_REDIRECT_URI="http://127.0.0.1:8080"
          PGHOST="localhost"
          PGPORT="5432"
          PGDATABASE="music_sync"
          PGUSER="postgres"
          DB_HOST="localhost"
          DB_PORT="5432"
          DB_NAME="music_sync"
          DB_USER="postgres"
          DB_PASSWORD=""
          EOF

            - name: Run Spondex Sync
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI: "http://127.0.0.1:8080"
          PGHOST: "localhost"
          PGPORT: "5432"
          PGDATABASE: "music_sync"
          PGUSER: "postgres"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_NAME: "music_sync"
          DB_USER: "postgres"
          DB_PASSWORD: ""
        run: |
          export SPOTIFY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}"
          export SPOTIFY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          export SPOTIFY_REDIRECT_URI="http://127.0.0.1:8080"
          uv run python src/main.py


